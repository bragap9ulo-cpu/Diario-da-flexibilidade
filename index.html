<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E7EDEC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Diário da Flexibilidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E7EDEC;
    --surface:#FBFCFB;
    --surface-2:#F1F5F4;
    --ink:#16262B;
    --ink-soft:#52646A;
    --ink-faint:#8A999D;
    --line:#D2DEDB;
    --line-strong:#BECAC7;
    --accent:#2E7D74;
    --accent-deep:#215E57;
    --accent-wash:#DCEBE7;
    --gold:#B5842F;
    --dusk:#3F4E7A;
    --open:#4FB3A6;
    --radius:16px;
    --radius-sm:11px;
    --pad:20px;
    --serif:'Spectral',Georgia,serif;
    --sans:'Hanken Grotesk',-apple-system,system-ui,sans-serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  #app{
    max-width:560px;
    margin:0 auto;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- Top bar / progress ---------- */
  .topbar{
    position:sticky;top:0;z-index:10;
    background:linear-gradient(var(--bg) 78%, transparent);
    padding:14px var(--pad) 8px;
  }
  .topbar.hidden{display:none;}
  .progress-head{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:9px;
  }
  .eyebrow{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent-deep);font-weight:600;
  }
  .stepcount{font-size:12px;color:var(--ink-faint);font-variant-numeric:tabular-nums;font-weight:500;}
  .progress-track{height:3px;background:var(--line);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:3px;width:0;transition:width .45s cubic-bezier(.22,.61,.36,1);}

  /* ---------- Screen container ---------- */
  .screens{flex:1;display:flex;flex-direction:column;}
  .screen{
    display:none;
    flex:1;
    flex-direction:column;
    padding:8px var(--pad) 24px;
    animation:rise .42s cubic-bezier(.22,.61,.36,1);
  }
  .screen.active{display:flex;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){
    .screen{animation:none;}
    .progress-fill{transition:none;}
  }

  h1.section-title{
    font-family:var(--serif);
    font-weight:500;
    font-size:27px;
    line-height:1.15;
    letter-spacing:-.01em;
    margin:14px 0 4px;
  }
  .section-hint{color:var(--ink-soft);font-size:14.5px;margin:0 0 20px;max-width:38ch;}
  .subgroup-label{
    font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-faint);font-weight:600;margin:22px 0 11px;
  }
  .subgroup-label:first-of-type{margin-top:4px;}

  /* ---------- Chips ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:9px;}
  .chip{
    font-family:var(--sans);font-size:15px;font-weight:500;
    color:var(--ink);background:var(--surface);
    border:1.5px solid var(--line);
    padding:11px 15px;border-radius:100px;
    cursor:pointer;transition:all .16s ease;
    display:inline-flex;align-items:center;gap:8px;
    line-height:1.2;
  }
  .chip:active{transform:scale(.97);}
  .chip .dot{
    width:15px;height:15px;border-radius:50%;
    border:1.5px solid var(--line-strong);
    flex-shrink:0;transition:all .16s ease;position:relative;
  }
  .chip[aria-pressed="true"]{
    background:var(--accent-wash);
    border-color:var(--accent);
    color:var(--accent-deep);
  }
  .chip[aria-pressed="true"] .dot{
    background:var(--accent);border-color:var(--accent);
  }
  .chip[aria-pressed="true"] .dot::after{
    content:"";position:absolute;inset:0;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none'><path d='M3.5 8.5l3 3 6-6.5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>") center/12px no-repeat;
  }

  /* ---------- Toggle (sim/não) ---------- */
  .toggle-row{display:flex;gap:10px;margin-bottom:4px;}
  .toggle-btn{
    flex:1;font-family:var(--sans);font-size:16px;font-weight:600;
    padding:14px;border-radius:var(--radius-sm);
    border:1.5px solid var(--line);background:var(--surface);
    color:var(--ink-soft);cursor:pointer;transition:all .16s ease;
  }
  .toggle-btn:active{transform:scale(.98);}
  .toggle-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}

  .conditional{display:none;}
  .conditional.show{display:block;animation:rise .3s ease;}

  /* ---------- Comment / textarea ---------- */
  .comment-wrap{margin-top:20px;}
  .field-label{font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:8px;display:block;}
  textarea{
    width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);
    background:var(--surface);border:1.5px solid var(--line);
    border-radius:var(--radius-sm);padding:13px 14px;resize:none;
    line-height:1.5;transition:border-color .16s ease;
  }
  textarea::placeholder{color:var(--ink-faint);}
  textarea:focus{outline:none;border-color:var(--accent);}
  .textarea-sm{min-height:64px;}
  .textarea-md{min-height:96px;}

  /* ---------- Opening screen ---------- */
  .open-screen{
    justify-content:space-between;
    padding-top:8vh;padding-bottom:28px;
  }
  .open-top{display:flex;flex-direction:column;}
  .open-kicker{
    font-family:var(--sans);font-size:12px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--accent-deep);font-weight:600;
    margin-bottom:26px;
  }
  .manifesto{
    font-family:var(--serif);font-style:italic;font-weight:400;
    font-size:26px;line-height:1.36;letter-spacing:-.005em;
    color:var(--ink);margin:0;
    animation:fadeManifesto 1.1s ease both;
  }
  .manifesto .em{color:var(--accent-deep);font-style:italic;}
  @keyframes fadeManifesto{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.manifesto{animation:none;}}
  .open-title{
    font-family:var(--serif);font-weight:600;font-size:19px;
    margin:34px 0 0;letter-spacing:-.01em;
  }
  .open-sub{color:var(--ink-soft);font-size:14px;margin:5px 0 0;}
  .date-block{margin-top:30px;}
  .date-label{font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:9px;display:block;}
  input[type=date]{
    font-family:var(--sans);font-size:16px;font-weight:500;color:var(--ink);
    background:var(--surface);border:1.5px solid var(--line);
    border-radius:var(--radius-sm);padding:13px 14px;width:100%;
  }
  input[type=date]:focus{outline:none;border-color:var(--accent);}
  .pts-input{
    font-family:var(--sans);font-size:16px;font-weight:500;color:var(--ink);
    background:var(--surface);border:1.5px solid var(--line);
    border-radius:var(--radius-sm);padding:13px 14px;width:100%;
  }
  .pts-input::placeholder{color:var(--ink-faint);font-weight:400;}
  .pts-input:focus{outline:none;border-color:var(--accent);}
  .loaded-note{
    font-size:13px;color:var(--gold);margin-top:11px;font-weight:500;
    display:none;
  }
  .loaded-note.show{display:block;}

  /* ---------- Scale screen ---------- */
  .scale-screen{justify-content:flex-start;}
  .ripple-stage{
    display:flex;align-items:center;justify-content:center;
    height:230px;margin:8px 0 6px;
  }
  .scale-value{
    text-align:center;font-family:var(--serif);
    font-size:15px;color:var(--ink-soft);font-style:italic;
    min-height:22px;margin-bottom:22px;
  }
  .scale-num{
    font-family:var(--serif);font-weight:600;font-size:44px;
    line-height:1;display:block;margin-bottom:6px;letter-spacing:-.02em;
  }
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:4px;
    background:linear-gradient(90deg,var(--dusk),var(--open));
    border-radius:4px;margin:6px 0 12px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:30px;height:30px;
    border-radius:50%;background:var(--surface);
    border:2.5px solid var(--accent);cursor:pointer;
    box-shadow:0 2px 8px rgba(22,38,43,.18);
  }
  input[type=range]::-moz-range-thumb{
    width:30px;height:30px;border-radius:50%;background:var(--surface);
    border:2.5px solid var(--accent);cursor:pointer;
  }
  .scale-ends{display:flex;justify-content:space-between;
    font-size:12.5px;color:var(--ink-faint);font-weight:500;}
  .scale-ends span{max-width:44%;}
  .scale-ends span:last-child{text-align:right;}

  /* ---------- Review screen ---------- */
  .review-intro{color:var(--ink-soft);font-size:14.5px;margin:0 0 18px;}
  .review-list{display:flex;flex-direction:column;gap:2px;}
  .review-row{
    text-align:left;width:100%;font-family:var(--sans);
    background:transparent;border:none;border-bottom:1px solid var(--line);
    padding:15px 2px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;
    transition:background .14s ease;
  }
  .review-row:active{background:var(--surface-2);}
  .review-row:last-child{border-bottom:none;}
  .review-key{
    font-family:var(--serif);font-size:15.5px;font-weight:500;
    color:var(--ink);flex-shrink:0;width:104px;padding-top:1px;
  }
  .review-val{font-size:14px;color:var(--ink-soft);flex:1;line-height:1.45;}
  .review-val.empty{color:var(--ink-faint);font-style:italic;}
  .review-edit{
    color:var(--ink-faint);font-size:12px;flex-shrink:0;align-self:center;
  }
  .review-scale-badge{
    font-family:var(--serif);font-weight:600;color:var(--accent-deep);
  }
  .save-area{margin-top:26px;}
  .saved-flag{
    display:none;text-align:center;font-size:14px;color:var(--accent-deep);
    font-weight:500;margin-top:14px;
  }
  .saved-flag.show{display:block;animation:rise .3s ease;}
  .saved-flag .serif{font-family:var(--serif);font-style:italic;}

  /* ---------- Nav bar ---------- */
  .navbar{
    position:sticky;bottom:0;z-index:10;
    display:flex;gap:12px;
    padding:14px var(--pad) calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 26%);
  }
  .navbar.hidden{display:none;}
  .btn{
    font-family:var(--sans);font-size:16px;font-weight:600;
    border-radius:var(--radius-sm);padding:15px 18px;cursor:pointer;
    border:1.5px solid transparent;transition:transform .12s ease,background .16s ease;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--accent);color:#fff;flex:1;}
  .btn-primary:active{background:var(--accent-deep);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border-color:var(--line-strong);}
  .btn-back{flex:0 0 auto;padding-left:20px;padding-right:20px;}
  .btn-full{width:100%;}
  .btn-gold{background:var(--gold);color:#fff;}
  .btn-outline{background:var(--surface);color:var(--accent-deep);border-color:var(--accent);}

  .export-row{display:flex;gap:12px;margin-top:12px;}
  .export-row .btn{flex:1;}

  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:14px;font-weight:500;
    padding:12px 20px;border-radius:100px;opacity:0;pointer-events:none;
    transition:all .3s ease;z-index:50;max-width:90vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:4px;}
</style>
</head>
<body>
<div id="app">

  <!-- Top progress bar -->
  <div class="topbar hidden" id="topbar">
    <div class="progress-head">
      <span class="eyebrow" id="eyebrow">Manhã</span>
      <span class="stepcount" id="stepcount">1 / 11</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="screens" id="screens"><!-- screens injected here --></div>

  <!-- Nav bar -->
  <div class="navbar hidden" id="navbar">
    <button class="btn btn-ghost btn-back" id="backBtn" type="button">Voltar</button>
    <button class="btn btn-primary" id="nextBtn" type="button">Avançar</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
"use strict";

/* =========================================================
   Diário da Flexibilidade Cognitiva
   Estrutura orientada a dados: SECTIONS descreve as telas
   de checklist. Telas especiais (abertura, corpo, trading,
   fechamento, escala, revisão) têm render próprio.
   Persistência: localStorage (rascunho + entradas por data).
   ========================================================= */

const STORE_DRAFT = 'diario_rascunho';
const STORE_ENTRIES = 'diario_entradas';

/* ---------- Definição das seções de checklist ---------- */
const SECTIONS = {
  estadoMental: {
    eyebrow:'Antes de começar', title:'Estado mental',
    hint:'Como você percebe seu estado agora? Pode marcar mais de um.',
    checks:['Limpo','Flexível','Presente','Neutro','Corpo leve','Corpo contraído','Túnel','Cobrança','No futuro','Compulsão','Ansioso','Pressa','Medo','Necessidade de provar algo','Cansado mentalmente','Cansado fisicamente']
  },
  acordar: {
    eyebrow:'Manhã', title:'Como acordei?',
    hint:'Marque tudo que reconhecer. Não precisa ser coerente.',
    checks:['Disposto','Sonolento','Torpor','Preguiça','Ansioso','Corpo leve','Corpo contraído','Ereção']
  },
  sono: {
    eyebrow:'Noite anterior', title:'Encerramento do dia anterior',
    hint:'Como foi o sono e o fim do dia de ontem?',
    checks:['Dormi cedo','Dormi tarde','Dormi relaxado','Mente acelerada','Compulsivo','Preocupado','Muito tempo no celular','Pensando no futuro','Dormi bem','Sono interrompido','Acordei várias vezes','Dormi menos de 6h','Dormi entre 6h a 8h','Dormi mais de 8h']
  },
  alimentacao: {
    eyebrow:'Corpo', title:'Alimentação',
    hint:'Como foi comer hoje?',
    checks:['Comi doce','Não comi doce','Comi compulsivamente','Comi conscientemente','Comi para aliviar alguma emoção']
  },
  trabalho: {
    eyebrow:'Dia', title:'Trabalho',
    hint:'Sem cobrança de produtividade — só observação.',
    checks:['Trabalhei bem','Não trabalhei','Estava presente','Trabalhei indisposto','Trabalhei por fuga','Entrei no túnel','Usei o Anti-Túnel','Trabalhei além do necessário','Voltei ao computador apenas por compulsão']
  },
  estudos: {
    eyebrow:'Dia', title:'Estudos',
    hint:'Como foi a qualidade da presença no estudo?',
    checks:['Estudei presente','Li com pressa','Já pensava no próximo capítulo','Inventei desculpas','Não tive tempo','Não priorizei']
  }
};

/* ---------- Estado da entrada em edição ---------- */
function todayISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off*60000).toISOString().slice(0,10);
}

function blankEntry(date){
  return {
    date: date || todayISO(),
    estadoMental:{checks:[],comentario:''},
    acordar:{checks:[],comentario:''},
    sono:{checks:[],comentario:''},
    corpo:{atividade:null,durante:[],seNao:[],comentario:''},
    trading:{antes:[],durante:[],depois:'',resultado:null,pontos:''},
    alimentacao:{checks:[],comentario:''},
    trabalho:{checks:[],comentario:''},
    estudos:{checks:[],comentario:''},
    fechamento:{contracao:'',voltar:'',tempoVoltar:null,integrado:'',percebeuAntes:null},
    escala:5,
    savedAt:null
  };
}

/* Normaliza uma entrada carregada, preenchendo campos que
   possam faltar em rascunhos/entradas de versões anteriores. */
function normalizeEntry(e){
  const out = blankEntry(e && e.date);
  if(!e) return out;
  out.date = e.date || out.date;
  out.savedAt = e.savedAt || null;
  out.escala = (typeof e.escala==='number') ? e.escala : out.escala;
  ['estadoMental','acordar','sono','alimentacao','trabalho','estudos'].forEach(k=>{
    if(e[k]){ out[k].checks = Array.isArray(e[k].checks)?e[k].checks:[]; out[k].comentario = e[k].comentario||''; }
  });
  if(e.corpo){
    out.corpo.atividade = (e.corpo.atividade===true||e.corpo.atividade===false)?e.corpo.atividade:null;
    out.corpo.durante = e.corpo.durante||[];
    out.corpo.seNao = e.corpo.seNao||[];
    out.corpo.comentario = e.corpo.comentario||'';
  }
  if(e.trading){
    out.trading.antes = e.trading.antes||[];
    out.trading.durante = e.trading.durante||[];
    out.trading.depois = e.trading.depois||'';
    out.trading.resultado = e.trading.resultado||null;
    out.trading.pontos = e.trading.pontos||'';
  }
  if(e.fechamento){
    out.fechamento.contracao = e.fechamento.contracao||'';
    out.fechamento.voltar = e.fechamento.voltar||'';
    out.fechamento.tempoVoltar = e.fechamento.tempoVoltar||null;
    out.fechamento.integrado = e.fechamento.integrado||'';
    out.fechamento.percebeuAntes = e.fechamento.percebeuAntes||null;
  }
  return out;
}

let entry = normalizeEntry(loadDraft());
let current = 0;

/* ---------- Persistência ---------- */
function loadDraft(){
  try{ const raw = localStorage.getItem(STORE_DRAFT); return raw?JSON.parse(raw):null; }
  catch(e){ return null; }
}
function saveDraft(){
  try{ localStorage.setItem(STORE_DRAFT, JSON.stringify(entry)); }catch(e){}
}
function loadEntries(){
  try{ const raw = localStorage.getItem(STORE_ENTRIES); return raw?JSON.parse(raw):{}; }
  catch(e){ return {}; }
}
function saveEntries(obj){
  try{ localStorage.setItem(STORE_ENTRIES, JSON.stringify(obj)); }catch(e){}
}

/* ---------- Utilidades de UI ---------- */
function el(tag, cls, html){
  const n=document.createElement(tag);
  if(cls) n.className=cls;
  if(html!=null) n.innerHTML=html;
  return n;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

/* Grupo de chips (checkbox múltiplo) ligado a um array do estado */
function chipGroup(options, arrRef){
  const wrap = el('div','chips');
  options.forEach(opt=>{
    const pressed = arrRef.includes(opt);
    const c = el('button','chip');
    c.type='button';
    c.setAttribute('aria-pressed', pressed?'true':'false');
    c.innerHTML = `<span class="dot"></span>${opt}`;
    c.addEventListener('click',()=>{
      const on = c.getAttribute('aria-pressed')==='true';
      if(on){ c.setAttribute('aria-pressed','false'); const i=arrRef.indexOf(opt); if(i>-1)arrRef.splice(i,1); }
      else{ c.setAttribute('aria-pressed','true'); arrRef.push(opt); }
      saveDraft();
    });
    wrap.appendChild(c);
  });
  return wrap;
}

/* Grupo de escolha única (radio) ligado a state[obj][key] */
function singleSelect(options, obj, key){
  const wrap = el('div','chips');
  options.forEach(opt=>{
    const c = el('button','chip'); c.type='button';
    c.setAttribute('aria-pressed', obj[key]===opt ? 'true':'false');
    c.innerHTML = `<span class="dot"></span>${opt}`;
    c.addEventListener('click',()=>{
      const already = obj[key]===opt;
      obj[key] = already ? null : opt; // toca de novo pra desmarcar
      wrap.querySelectorAll('.chip').forEach((b,i)=>{
        b.setAttribute('aria-pressed', (!already && options[i]===opt) ? 'true':'false');
      });
      saveDraft();
    });
    wrap.appendChild(c);
  });
  return wrap;
}

/* Campo de comentário ligado a state[obj][key] */
function commentField(label, obj, key, size){
  const wrap = el('div','comment-wrap');
  const lab = el('label','field-label', label||'Comentário');
  const ta = el('textarea', size==='md'?'textarea-md':'textarea-sm');
  ta.value = obj[key]||'';
  ta.placeholder = 'Escreva livremente…';
  const id = 'ta_'+Math.random().toString(36).slice(2,7);
  ta.id=id; lab.setAttribute('for',id);
  ta.addEventListener('input',()=>{ obj[key]=ta.value; saveDraft(); });
  wrap.appendChild(lab); wrap.appendChild(ta);
  return wrap;
}

/* =========================================================
   Construção das telas
   ========================================================= */
const screensEl = document.getElementById('screens');
const SCREENS = []; // {id, eyebrow, build(container)}

/* Tela 0 — Abertura */
SCREENS.push({
  id:'abertura', eyebrow:'', chrome:false,
  build(s){
    s.classList.add('open-screen');
    const top = el('div','open-top');

/* =========================================================
   Assinatura visual — ondulações (ripples) da escala
   0 = ponto contraído (dusk) → 10 = ondas abertas (open)
   ========================================================= */
function lerp(a,b,t){return a+(b-a)*t;}
function hexToRgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function mix(c1,c2,t){const a=hexToRgb(c1),b=hexToRgb(c2);
  return `rgb(${Math.round(lerp(a[0],b[0],t))},${Math.round(lerp(a[1],b[1],t))},${Math.round(lerp(a[2],b[2],t))})`;}

function rippleSVG(v){
  const t = v/10;
  const color = mix('#3F4E7A','#4FB3A6',t);
  const cx=110, cy=110;
  const coreR = lerp(9,18,t);
  const rings = Math.max(0, Math.round(t*4)); // 0..4 anéis
  const maxR = lerp(20,96,t);
  let parts = '';
  for(let i=rings;i>=1;i--){
    const r = lerp(coreR+8, maxR, i/Math.max(rings,1));
    const op = lerp(0.30,0.05, i/Math.max(rings,1));
    const sw = lerp(2.2,1, i/Math.max(rings,1));
    parts += `<circle cx="${cx}" cy="${cy}" r="${r.toFixed(1)}" fill="none" stroke="${color}" stroke-width="${sw.toFixed(1)}" opacity="${op.toFixed(2)}"/>`;
  }
  parts += `<circle cx="${cx}" cy="${cy}" r="${coreR.toFixed(1)}" fill="${color}" opacity="0.92"/>`;
  return `<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nível ${v} de 10">${parts}</svg>`;
}
function scaleWord(v){
  const words=['totalmente contraído','muito contraído','contraído','tenso','meio fechado',
    'neutro','razoavelmente aberto','disponível','aberto','muito aberto','totalmente disponível para a vida'];
  return words[v];
}

/* =========================================================
   Resumos para a tela de revisão
   ========================================================= */
function summarize(checks, comment){
  const parts=[];
  if(checks && checks.length) parts.push(checks.join(', '));
  if(comment && comment.trim()) parts.push('“'+comment.trim()+'”');
  return parts.join(' · ');
}
function corpoSummary(){
  const c=entry.corpo;
  let head = c.atividade===true?'Fez atividade': c.atividade===false?'Não fez atividade':'';
  const checks = c.atividade===true?c.durante:c.atividade===false?c.seNao:[];
  const body = summarize(checks, c.comentario);
  return [head, body].filter(Boolean).join(' · ');
}
function tradingSummary(){
  const t=entry.trading;
  let res='';
  if(t.resultado){
    res = t.resultado;
    if(t.pontos && t.pontos.trim()) res += ` (${t.pontos.trim()} pts)`;
  }
  const base = summarize([].concat(t.antes, t.durante), t.depois);
  return [res, base].filter(Boolean).join(' · ');
}
function formatDateLong(iso){
  try{
    const [y,m,d]=iso.split('-');
    const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return `${parseInt(d,10)} de ${meses[parseInt(m,10)-1]} de ${y}`;
  }catch(e){return iso;}
}

/* =========================================================
   Exportação (JSON de todas as entradas)
   Tenta compartilhar arquivo; se não der, baixa.
   ========================================================= */
async function exportAll(){
  const entries = loadEntries();
  const list = Object.values(entries).sort((a,b)=> a.date<b.date?-1:1);
  if(!list.length){ toast('Nenhum dia salvo ainda'); return; }
  const payload = {
    app:'Diário da Flexibilidade Cognitiva',
    versao:1,
    exportadoEm:new Date().toISOString(),
    total:list.length,
    entradas:list
  };
  const json = JSON.stringify(payload,null,2);
  const fname = `diario_flexibilidade_${todayISO()}.json`;
  const blob = new Blob([json],{type:'application/json'});
  const file = new File([blob], fname, {type:'application/json'});

  // 1) Web Share com arquivo (melhor no celular)
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file], title:'Diário da Flexibilidade', text:'Export do diário'});
      return;
    }catch(e){ if(e && e.name==='AbortError') return; }
  }
  // 2) Fallback: download
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=fname; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(url);
  toast(`Exportado (${list.length} ${list.length===1?'dia':'dias'})`);
}

/* =========================================================
   Navegação
   ========================================================= */
const topbar=document.getElementById('topbar');
const navbar=document.getElementById('navbar');
const backBtn=document.getElementById('backBtn');
const nextBtn=document.getElementById('nextBtn');
const eyebrowEl=document.getElementById('eyebrow');
const stepcountEl=document.getElementById('stepcount');
const progressFill=document.getElementById('progressFill');

function rebuildAll(){
  screensEl.innerHTML='';
  SCREENS.forEach((sc,i)=>{
    const div = el('div','screen');
    div.dataset.index=i;
    sc.build(div);
    screensEl.appendChild(div);
    sc._node=div;
  });
  showScreen(current, true);
}

function showScreen(i, instant){
  current=i;
  SCREENS.forEach((sc,idx)=>{
    sc._node.classList.toggle('active', idx===i);
  });
  const sc = SCREENS[i];
  const showChrome = sc.chrome;
  topbar.classList.toggle('hidden', !showChrome);
  navbar.classList.toggle('hidden', !showChrome);
  if(showChrome){
    eyebrowEl.textContent = sc.eyebrow || '';
    // conta apenas telas com chrome (1..N)
    const chromeScreens = SCREENS.filter(x=>x.chrome);
    const pos = chromeScreens.indexOf(sc)+1;
    const total = chromeScreens.length;
    stepcountEl.textContent = `${pos} / ${total}`;
    progressFill.style.width = (pos/total*100)+'%';
    nextBtn.textContent = (i===SCREENS.length-1) ? 'Concluir' : 'Avançar';
  }
  window.scrollTo({top:0, behavior: instant?'auto':'smooth'});
}

function goTo(i){
  if(i<0) i=0; if(i>SCREENS.length-1) i=SCREENS.length-1;
  showScreen(i);
}
function indexOfScreen(id){ return SCREENS.findIndex(s=>s.id===id); }
function goToId(id){ const i=indexOfScreen(id); if(i>=0) goTo(i); }

backBtn.addEventListener('click',()=>{ if(current>0) goTo(current-1); });
nextBtn.addEventListener('click',()=>{
  if(current < SCREENS.length-1) goTo(current+1);
  else goTo(SCREENS.length-1); // já na revisão
});

/* Init */
rebuildAll();
showScreen(0, true);
